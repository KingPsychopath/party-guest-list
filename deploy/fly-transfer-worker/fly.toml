# Deploy from the repo root:
#   fly deploy -c deploy/fly-transfer-worker/fly.toml

app = "party-guest-list-transfer-worker"
primary_region = "lhr"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  MEDIA_PROCESSOR_MODE = "hybrid"
  TRANSFER_MEDIA_WORKER_ENABLED = "1"
  TRANSFER_MEDIA_QUEUE_ENABLED = "1"
  TRANSFER_MEDIA_WORKER_BATCH_SIZE = "8"
  TRANSFER_MEDIA_WORKER_CONCURRENCY = "4"
  TRANSFER_MEDIA_WORKER_POLL_MS = "1000"
  TRANSFER_MEDIA_WORKER_EMPTY_BACKOFF_MS = "5000"
  TRANSFER_MEDIA_WORKER_ERROR_BACKOFF_MS = "15000"
  TRANSFER_MEDIA_FORCE_WORKER_FOR_HEIF = "1"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
